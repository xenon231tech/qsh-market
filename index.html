<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFT Marketplace</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .app-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .app-container h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 32px;
        }
        
        .input-section, .controls, .search-box, .task-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        input, select, button {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }
        
        button {
            background: #007bff;
            color: white;
            cursor: pointer;
            border: none;
        }
        
        button:hover {
            background: #0056b3;
        }
        
        .stat-card {
            background: #f0f0f0;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin: 10px;
        }
        
        .stat-card h2 {
            margin: 10px 0;
            font-size: 24px;
        }
        
        .card {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            cursor: pointer;
            border-radius: 5px;
            user-select: none;
        }
        
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }
        
        .nfts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .nft-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .chat-box {
            height: 300px;
            overflow-y: auto;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }
        
        .expense-item, .task-item, .crypto-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background: #f0f0f0;
            margin: 5px 0;
            border-radius: 5px;
        }
        
        .playlist {
            margin-top: 20px;
        }
        
        .block {
            border: 1px solid #ddd;
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            cursor: pointer;
        }
        
        .block:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div class="app-container">
            <h1>🖼️ NFT Marketplace</h1>
            <div class="marketplace">
                <div class="nfts-grid" id="nfts"></div>
                <div class="cart">
                    <h3>Cart</h3>
                    <div id="cart-items"></div>
                    <div>Total: $<strong id="total">0</strong></div>
                </div>
            </div>
        </div>
    <script src="script.js"></script>
</body>
</html>
