<!DOCTYPE html>
<html>
<head>
    <title>QSH Market</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: #0d0d1a;
            color: white;
        }
        h1 {
            color: #ff6600;
        }
        button {
            background: #ff6600;
            border: none;
            padding: 12px 24px;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
        }
        .card {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 12px;
            margin: 20px auto;
            width: 90%;
            max-width: 300px;
        }
    </style>
</head>
<body>
    <h1>🔥 QSH Market</h1>
    <p>Marketplace NFT</p>
    
    <div class="card">
        <h3>Mint NFT</h3>
        <button>Mint Sekarang</button>
    </div>
    
    <div class="card">
        <h3>List NFT</h3>
        <button>Lihat Koleksi</button>
    </div>
    
    <button>🔌 Connect Wallet</button>
    
    <script>
        console.log("QSH Market siap!");
    </script>
</body>
</html>
